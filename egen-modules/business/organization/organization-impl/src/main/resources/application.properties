# Module business Organization (Niveau 2) — configuration Quarkus.
#
# Fusion actee par la Charte v3 (§C.1) de trois anciens systemes du Kernel :
# Organisationnel (A2), Rattachements (A3) et Politique organisationnelle (§B.12,
# anciennement mal etiquetee "Systeme B1"). Une seule sequence Flyway desormais
# (db/migration/organization couvre les trois sous-domaines : racine = organisation,
# affiliation/ , politique/ n'existent plus comme sous-dossiers distincts, seuls les
# fichiers V1/V2/V3 le sont — voir la note de convention dans V1__init_organization.sql).
#
# classpath:db/migration/identity est ajoute uniquement pour que les tests
# d'integration reels du sous-domaine affiliation (qui verifient une reference
# Personne effective) disposent des tables identity — identity-provider-keycloak
# n'est une dependance que de scope TEST (voir pom.xml), donc cette location ne
# resout jamais rien en production.
quarkus.application.name=egen-modules-business-organization

quarkus.datasource.db-kind=postgresql

quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration/organization,classpath:db/migration/identity
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.table=flyway_schema_history_organization
