# Systeme Organisationnel (A2) — configuration Quarkus.
quarkus.application.name=egen-kernel-organization

quarkus.datasource.db-kind=postgresql

quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration/organization
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.table=flyway_schema_history_organization
