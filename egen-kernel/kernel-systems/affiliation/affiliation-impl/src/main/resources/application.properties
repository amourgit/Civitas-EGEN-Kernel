# Systeme Rattachements (A3) — configuration Quarkus.
quarkus.application.name=egen-kernel-affiliation

quarkus.datasource.db-kind=postgresql

quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration/affiliation,classpath:db/migration/identity,classpath:db/migration/organization
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.table=flyway_schema_history_affiliation
