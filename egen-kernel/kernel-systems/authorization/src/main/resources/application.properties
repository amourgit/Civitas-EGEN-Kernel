# Systeme Authorization (primitif Niveau 1) — configuration Quarkus.
#
# Aucune quarkus.datasource.jdbc.url n'est fixee ici : en dev et en test, Quarkus Dev
# Services provisionne automatiquement un conteneur PostgreSQL ephemere (necessite
# Docker). En production, kernel-bootstrap fournira l'URL reelle via variables
# d'environnement, qui prennent le pas sur ce fichier.
quarkus.application.name=egen-kernel-authorization

quarkus.datasource.db-kind=postgresql

# Flyway est proprietaire du schema ; Hibernate se contente de le valider — jamais de
# generation automatique en dehors des migrations versionnees.
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration/authorization
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.table=flyway_schema_history_authorization
