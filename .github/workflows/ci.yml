name: EGEN Kernel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test (reactor complet)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Construire et tester tout le reacteur Maven
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          mvn -B -ntp verify 2>&1 | tee /tmp/maven-build.log

      - name: Publier le resume du build en commentaire de commit
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTCOME: ${{ steps.build.outcome }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re

          outcome = os.environ["OUTCOME"]
          run_url = os.environ["RUN_URL"]

          with open('/tmp/maven-build.log', 'r', errors='replace') as f:
              content = f.read()

          if outcome == "failure":
              tail = content[-55000:]
              body = (
                  "### Diagnostic automatique - echec du build Maven\n\n"
                  f"Run : {run_url}\n\n"
                  "```\n" + tail + "\n```"
              )
          else:
              lines = [
                  l for l in content.splitlines()
                  if "Tests run:" in l or l.strip().startswith("[INFO] Building ")
                  or "BUILD SUCCESS" in l
              ]
              summary = "\n".join(lines) if lines else "(aucune ligne de synthese trouvee)"
              body = (
                  "### Resume automatique - build reussi\n\n"
                  f"Run : {run_url}\n\n"
                  "```\n" + summary + "\n```"
              )

          with open('/tmp/payload.json', 'w') as f:
              json.dump({"body": body}, f)
          PYEOF
          curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/commits/${SHA}/comments" \
            -d @/tmp/payload.json

      - name: Publier les rapports de test en cas d'echec
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.txt'
          if-no-files-found: ignore

      - name: Faire echouer le job si le build a echoue
        if: steps.build.outcome == 'failure'
        run: exit 1
